<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua API Example</title>
    <style>
        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background: linear-gradient(180deg, #f7f0e4 0%, #efe5d3 100%);
            color: #1f1a17;
        }

        .page {
            max-width: 760px;
            margin: 40px auto;
            padding: 24px;
        }

        .card {
            background: rgba(255, 252, 247, 0.96);
            border: 1px solid #d8c9b4;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 18px 40px rgba(80, 52, 24, 0.12);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 16px;
            line-height: 1.5;
        }

        .endpoint {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #f2e6d6;
            font-size: 0.95rem;
            word-break: break-all;
        }

        textarea {
            width: 100%;
            min-height: 220px;
            box-sizing: border-box;
            padding: 14px;
            border: 1px solid #bca991;
            border-radius: 10px;
            resize: vertical;
            font: 14px/1.45 Consolas, "Courier New", monospace;
            background: #fffdfa;
            color: #1f1a17;
        }

        .model-input {
            min-height: 260px;
            margin-top: 14px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            font-size: 1rem;
            cursor: pointer;
        }

        .run {
            background: #205c45;
            color: #fff;
        }

        .clear {
            background: #d9c6ae;
            color: #2b211a;
        }

        .status {
            margin-top: 18px;
            font-weight: 700;
        }

        .label {
            display: block;
            margin-top: 14px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        pre {
            margin: 12px 0 0;
            padding: 14px;
            border-radius: 10px;
            background: #191714;
            color: #f5f1ea;
            overflow-x: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Roblox Sim Api</h1>
            <div class="endpoint" id="endpointLabel"></div>
                        <label class="label" for="codeInput">Lua Code</label>
                        <textarea id="codeInput">local x = game.Workspace</textarea>
                        <label class="label" for="dataModelInput">Data Model JSON</label>
                        <textarea id="dataModelInput" class="model-input">{
    "ClassName": "DataModel",
    "Children": [
        {
            "ClassName": "Workspace",
            "Children": [
                {
                    "ClassName": "Part",
                    "Properties": {"Name": "Part1"}
                },
                {
                    "ClassName": "Model",
                    "Children": [
                        {
                            "ClassName": "Part"
                        }
                    ]
                }
            ]
        }
    ]
}</textarea>
            <div class="controls">
                <button class="run" id="runButton">Run Code</button>
                <button class="clear" id="clearButton">Clear Output</button>
            </div>
            <div class="status" id="statusText">Ready.</div>
            <pre id="output">No response yet.</pre>
        </section>
    </main>

    <script>
        const FALLBACK_API_BASE = "https://roblox-sim-api-production.up.railway.app/eval-api";
        let executeUrl = `${FALLBACK_API_BASE}/execute`;

        const endpointLabel = document.getElementById("endpointLabel");
        const codeInput = document.getElementById("codeInput");
        const dataModelInput = document.getElementById("dataModelInput");
        const statusText = document.getElementById("statusText");
        const output = document.getElementById("output");
        const runButton = document.getElementById("runButton");
        const clearButton = document.getElementById("clearButton");

        async function loadClientConfig() {
            try {
                const response = await fetch("./client-config");
                if (!response.ok) {
                    throw new Error("config request failed");
                }

                const data = await response.json();
                const apiBase = (data.api_base_url || FALLBACK_API_BASE).replace(/\/$/, "");
                executeUrl = `${apiBase}/execute`;
            } catch {
                executeUrl = `${FALLBACK_API_BASE}/execute`;
            }

            endpointLabel.textContent = `POST ${executeUrl}`;
        }

        function renderResponse(data) {
            output.textContent = JSON.stringify(data, null, 2);
        }

        async function runCode() {
            const code = codeInput.value.trim();
            if (!code) {
                statusText.textContent = "Enter some Lua code first.";
                return;
            }

            let dataModel;
            try {
                dataModel = JSON.parse(dataModelInput.value);
            } catch (error) {
                statusText.textContent = "Data model JSON is invalid.";
                output.textContent = error.message;
                return;
            }

            statusText.textContent = "Running...";

            try {
                const response = await fetch(executeUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        code,
                        max_run_time: 1,
                        data_model: dataModel
                    })
                });

                const data = await response.json();
                renderResponse(data);
                statusText.textContent = response.ok ? `Done: ${data.status}` : `Request failed: ${response.status}`;
            } catch (error) {
                statusText.textContent = "Request failed.";
                output.textContent = error.message;
            }
        }

        function clearOutput() {
            statusText.textContent = "Ready.";
            output.textContent = "No response yet.";
        }

        runButton.addEventListener("click", runCode);
        clearButton.addEventListener("click", clearOutput);
        loadClientConfig();
    </script>
</body>
</html>
